services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tempa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "7432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tempa"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tempa?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7001:3001"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const http=require('http');http.get('http://localhost:3001/api/health',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:7001/api
    environment:
      API_BASE_URL: http://backend:3001/api
      NEXT_PUBLIC_API_BASE_URL: http://localhost:7001/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "7000:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const http=require('http');http.get('http://localhost:3000',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
