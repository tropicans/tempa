name: Frontend Smoke

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-smoke.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-smoke.yml'

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Start frontend
        run: npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/tempa-frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/tempa-frontend.log
          exit 1

      - name: Run smoke test
        run: npm run test:smoke
        env:
          TEST_BASE_URL: http://127.0.0.1:3000
